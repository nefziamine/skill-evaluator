stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.pricing.pro.monthly=${STRIPE_PRO_MONTHLY_PRICE_ID:price_placeholder}
stripe.pricing.enterprise.monthly=${STRIPE_ENTERPRISE_MONTHLY_PRICE_ID:price_placeholder}
stripe.pricing.pro.annual=${STRIPE_PRO_ANNUAL_PRICE_ID:price_placeholder}
stripe.pricing.enterprise.annual=${STRIPE_ENTERPRISE_ANNUAL_PRICE_ID:price_placeholder}

# Frontend configuration for redirects
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Brevo Configuration
